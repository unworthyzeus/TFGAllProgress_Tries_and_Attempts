seed: 42

data:
  format: hdf5
  hdf5_path: ../Datasets/CKM_Dataset_270326.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: los_mask
  distance_map_channel: true
  exclude_non_ground_targets: true
  non_ground_threshold: 0.0
  path_loss_formula_input:
    enabled: true
    formula: hybrid_damped_coherent_two_ray_deepshadow_vinogradov_nlos
    regime_calibration_json: prior_calibration/regime_obstruction_train_only_deepshadow_directml_quick.json
    meters_per_pixel: 1.0
    frequency_ghz: 7.125
    receiver_height_m: 1.5
    include_confidence_channel: true
    confidence_kernel_size: 31
    cache_version: try50_prior_conf_v3
    cache_enabled: false
    cache_dir: prior_cache/try50_prior_conf_v3
    precomputed_hdf5: ""
  path_loss_obstruction_features:
    enabled: true
    precomputed_hdf5: precomputed/obstruction_features_u8.h5
    meters_per_pixel: 1.0
    angle_bins: 720
    include_shadow_depth: true
    include_distance_since_los_break: true
    include_max_blocker_height: true
    include_blocker_count: true
  path_loss_saturation_db: 180
  path_loss_ignore_nonfinite: true
  target_field_map: {}
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns:
    - antenna_height_m
  hdf5_scalar_specs:
    - name: antenna_height_m
      from_dataset: uav_height
  constant_scalar_features: {}
  scalar_feature_norms:
    antenna_height_m: 120.0
  image_size: 513
  num_workers: 6
  val_num_workers: 6
  val_batch_size: 2
  persistent_workers: false
  val_persistent_workers: false
  prefetch_factor: 8

augmentation:
  enable: false

model:
  base_channels: 96
  disc_base_channels: 40
  disc_norm_type: group
  disc_input_downsample_factor: 1
  encoder_blocks: [2, 2, 2, 2]
  context_dilations: [1, 2, 4, 8]
  dropout: 0.05
  gradient_checkpointing: true
  out_channels: 2
  use_scalar_channels: true
  norm_type: group

training:
  batch_size: 1
  epochs: 250
  early_stopping:
    enabled: false
  selection_metrics:
    path_loss.rmse_physical: 1.0
  save_validation_json_each_epoch: true
  run_final_test_after_training: true
  optimizer: adamw
  learning_rate: 8.0e-5
  weight_decay: 1.0e-5
  beta1: 0.5
  beta2: 0.999
  lr_scheduler: reduce_on_plateau
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 5
  lr_scheduler_min_lr: 5.0e-6
  amp: true
  clip_grad_norm: 1.0
  save_every: 5

loss:
  mse_weight: 1.0
  l1_weight: 0.1
  multiscale_path_loss:
    enabled: false
    scales: [2, 4]
    weights: [0.6, 0.4]
    min_valid_ratio: 0.5
    loss_weight: 0.35

tail_refiner:
  refiner_arch: unet
  refiner_base_channels: 96
  use_gate: true
  gate_loss_weight: 0.15
  residual_weight: 1.0
  final_weight: 0.5
  prediction_key: stage1_pred_norm_f16
  abs_error_key: stage1_abs_error_db_f16
  stage1_outputs_train_hdf5: outputs/fiftiethtry50_stage1_outputs_hdf5/stage1_outputs_train.h5
  stage1_outputs_val_hdf5: outputs/fiftiethtry50_stage1_outputs_hdf5/stage1_outputs_val.h5
  oversample:
    enabled: true
    threshold_db: 6.0
    temperature_db: 2.5
    alpha: 1.0
    nlos_boost: 0.75
    antenna_boost: 0.5
  tail_focus:
    enabled: true
    threshold_db: 6.0
    temperature_db: 2.5
    alpha: 1.0
    nlos_boost: 0.75
    antenna_boost: 0.5
    max_weight: 5.0
  gate_target:
    threshold_db: 6.0
    temperature_db: 2.0

runtime:
  device: cuda
  output_dir: outputs/fiftiethtry50_tail_refiner_stage2_4gpu
  resume_checkpoint: ""

target_columns:
  - path_loss

target_losses:
  path_loss: mse

target_metadata:
  path_loss:
    scale: 180.0
    offset: 0.0
    unit: dB
    clip_min: 0.0
    clip_max: 180.0
    predict_linear: false

seed: 56
data:
  format: hdf5
  hdf5_path: ../../../Datasets/CKM_Dataset_270326.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: los_mask
  distance_map_channel: true
  path_loss_saturation_db: 180
  path_loss_ignore_nonfinite: true
  target_field_map: {}
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns:
  - antenna_height_m
  hdf5_scalar_specs:
  - name: antenna_height_m
    from_dataset: uav_height
  constant_scalar_features: {}
  scalar_feature_norms:
    antenna_height_m: 120.0
  image_size: 513
  num_workers: 2
  split_mode: city_holdout
  topology_mask_channel: true
  topology_mask_threshold: 0.0
  apply_topology_mask_to_targets: true
  append_no_data_target: true
  partition_filter:
    topology_class: mixed_compact_midrise
  topology_partitioning:
    density_q1: 0.12
    density_q2: 0.28
    height_q1: 12.0
    height_q2: 28.0
model:
  base_channels: 12
  gradient_checkpointing: false
  out_channels: 3
  use_scalar_channels: true
  use_scalar_film: true
  scalar_film_hidden: 32
  upsample_mode: bilinear
  norm_type: group
  dropout_down3: 0.18
  dropout_down4: 0.3
  dropout_up1: 0.16
training:
  batch_size: 6
  epochs: 500
  early_stopping:
    enabled: false
    patience: 15
    min_delta: 0.0
  scalar_report_samples: 1000
  selection_metrics:
    delay_spread.rmse_physical: 1.0
    angular_spread.rmse_physical: 1.0
  save_validation_json_each_epoch: true
  run_final_test_after_training: true
  auto_batch_by_vram:
    enabled: false
    reference_vram_gb: 12.0
    reference_batch_size: 6
    min_batch_size: 1
    max_batch_size: 6
    safety_factor: 0.92
  generator_lr: 0.001
  beta1: 0.5
  beta2: 0.999
  weight_decay: 0.1
  lr_scheduler: none
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 4
  lr_scheduler_min_lr: 5.0e-06
  amp: true
  clip_grad_norm: 1.0
  save_every: 1
  generator_optimizer: adamw
  ema_decay: 1.0
loss:
  lambda_recon: 100.0
  mse_weight: 1.0
  l1_weight: 0.2
  target_loss_weights:
    delay_spread: 1.0
    angular_spread: 1.0
    no_data: 0.2
multiscale_targets:
  enabled: false
  targets:
  - delay_spread
  - angular_spread
  target_weights:
    delay_spread: 1.0
    angular_spread: 1.0
  scales:
  - 2
  - 4
  weights:
  - 0.6
  - 0.4
  min_valid_ratio: 0.5
  loss_weight: 0.3
gradient_targets:
  enabled: false
  targets:
  - delay_spread
  - angular_spread
  target_weights:
    delay_spread: 1.0
    angular_spread: 1.0
  min_valid_ratio: 0.5
  loss_weight: 0.2
augmentation:
  enable: true
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.4
runtime:
  device: cuda
  output_dir: outputs/fiftysixthtry56_mixed_compact_midrise
  resume_checkpoint: null
postprocess:
  enable: true
  use_saved_heuristic_calibration: false
  regression_median_kernel: 1
  export_derived_link_budget_maps: false
  link_budget:
    tx_power_dbm: 46.0
    tx_gain_dbi: 0.0
    rx_gain_dbi: 0.0
    other_losses_db: 0.0
    bandwidth_hz: null
    noise_figure_db: 0.0
    reception_threshold_dbm: null
target_columns:
- delay_spread
- angular_spread
- no_data
target_losses:
  delay_spread: mse
  angular_spread: mse
  no_data: bce
target_metadata:
  delay_spread:
    scale: 1000.0
    offset: 0.0
    unit: ns
    clip_min: 0.0
    clip_max: 1000.0
  angular_spread:
    scale: 180.0
    offset: 0.0
    unit: deg
    clip_min: 0.0
    clip_max: 180.0
path_loss_hybrid:
  enabled: false
  confidence_loss_weight: 0.0
  confidence_error_threshold_db: 8.0
  fallback_threshold: 0.5
  fallback_mode: blend
experiment:
  try: '56'
  family: try26_unet_topology_experts
  topology_class: mixed_compact_midrise
  uses_topology_mask: true
  uses_no_data_aux: true
  speed_profile: throughput_optimized

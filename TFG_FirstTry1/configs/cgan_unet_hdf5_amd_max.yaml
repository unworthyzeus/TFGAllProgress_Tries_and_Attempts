seed: 42
data:
  format: hdf5
  hdf5_path: CKM_Dataset.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: null
  target_field_map: {}
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns: []
  constant_scalar_features: {}
  scalar_feature_norms: {}
  image_size: 513
  num_workers: 0
model:
  base_channels: 128
  disc_base_channels: 128
  out_channels: 4
  use_scalar_channels: false
training:
  batch_size: 1
  epochs: 40
  generator_lr: 0.0002
  discriminator_lr: 0.0002
  beta1: 0.5
  beta2: 0.999
  weight_decay: 0.0
  amp: false
  clip_grad_norm: 1.0
  save_every: 5
  subset_size: null
loss:
  adversarial_loss: mse
  lambda_gan: 1.0
  lambda_recon: 100.0
  mse_weight: 1.0
  l1_weight: 0.2
augmentation:
  enable: true
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.4
runtime:
  device: directml
  output_dir: outputs/cgan_unet_hdf5_amd_max
  resume_checkpoint: null
postprocess:
  enable: true
  regression_median_kernel: 3
target_columns:
- delay_spread
- angular_spread
- path_loss
- los_mask
target_losses:
  delay_spread: mse
  angular_spread: mse
  path_loss: mse
  los_mask: mse
target_metadata:
  delay_spread:
    scale: 1000.0
    offset: 0.0
    unit: ns
    clip_min: 0.0
    clip_max: 1000.0
  angular_spread:
    scale: 180.0
    offset: 0.0
    unit: deg
    clip_min: 0.0
    clip_max: 180.0
  path_loss:
    scale: 180.0
    offset: 0.0
    unit: dB
    clip_min: 0.0
    clip_max: 180.0
  los_mask:
    scale: 1.0
    offset: 0.0
    unit: binary_los
    clip_min: 0.0
    clip_max: 1.0

seed: 42

data:
  format: hdf5
  hdf5_path: ../Datasets/CKM_Dataset_old_and_small.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: los_mask
  target_field_map: {}
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns: []
  constant_scalar_features: {}
  scalar_feature_norms: {}
  image_size: 513
  num_workers: 8

model:
  base_channels: 128
  out_channels: 3
  use_scalar_channels: false

training:
  batch_size: 2
  auto_batch_by_vram:
    enabled: true
    reference_vram_gb: 24.0
    reference_batch_size: 2
    min_batch_size: 1
    max_batch_size: 8
    safety_factor: 0.9
  epochs: 40
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  clip_grad_norm: 1.0
  save_every: 5
  subset_size: null

loss:
  mse_weight: 1.0
  l1_weight: 0.25

augmentation:
  enable: true
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.4

runtime:
  device: cuda
  output_dir: outputs/baseline_hdf5_cuda_max
  resume_checkpoint: null

postprocess:
  enable: true
  regression_median_kernel: 3

target_columns:
  - delay_spread
  - angular_spread
  - path_loss

target_losses:
  delay_spread: mse
  angular_spread: mse
  path_loss: mse

target_metadata:
  delay_spread:
    scale: 1000.0
    offset: 0.0
    unit: ns
    clip_min: 0.0
    clip_max: 1000.0
  angular_spread:
    scale: 180.0
    offset: 0.0
    unit: deg
    clip_min: 0.0
    clip_max: 180.0
  path_loss:
    scale: 180.0
    offset: 0.0
    unit: dB
    clip_min: 0.0
    clip_max: 180.0

seed: 42

data:
  format: hdf5
  hdf5_path: ../Datasets/CKM_Dataset_270326.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: los_mask
  distance_map_channel: true
  exclude_non_ground_targets: true
  non_ground_threshold: 0.0
  path_loss_formula_input:
    enabled: true
    formula: hybrid_two_ray_cost231_a2g_nlos
    regime_calibration_json: prior_calibration/regime_obstruction_train_only_from_try47.json
    prefer_threshold_city_type: true
    meters_per_pixel: 1.0
    frequency_ghz: 7.125
    receiver_height_m: 1.5
    include_confidence_channel: true
    confidence_kernel_size: 31
    cache_version: try51_prior_auto_city_v1
    cache_enabled: false
    cache_dir: prior_cache/try51_prior_auto_city_v1
    precomputed_hdf5: ""
  path_loss_obstruction_features:
    enabled: false
    precomputed_hdf5: ../TFGFortySeventhTry47/precomputed/obstruction_features_u8.h5
    meters_per_pixel: 1.0
    angle_bins: 720
    include_shadow_depth: true
    include_distance_since_los_break: true
    include_max_blocker_height: true
    include_blocker_count: true
  path_loss_saturation_db: 180
  path_loss_ignore_nonfinite: true
  target_field_map: {}
  split_mode: city_holdout
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns:
    - antenna_height_m
  hdf5_scalar_specs:
    - name: antenna_height_m
      from_dataset: uav_height
  constant_scalar_features: {}
  scalar_feature_norms:
    antenna_height_m: 120.0
  image_size: 513
  num_workers: 6
  val_num_workers: 6
  persistent_workers: false
  val_persistent_workers: false
  prefetch_factor: 8

model:
  base_channels: 112
  disc_base_channels: 40
  disc_norm_type: group
  disc_input_downsample_factor: 1
  encoder_blocks: [2, 2, 2, 2]
  context_dilations: [1, 2, 4, 8]
  dropout: 0.05
  gradient_checkpointing: true
  out_channels: 1
  use_scalar_channels: true
  norm_type: group

training:
  batch_size: 1
  epochs: 250
  early_stopping:
    enabled: false
  selection_metrics:
    path_loss.rmse_physical: 1.0
  save_validation_json_each_epoch: true
  run_final_test_after_training: true
  auto_batch_by_vram:
    enabled: false
    reference_vram_gb: 80.0
    reference_batch_size: 1
    min_batch_size: 1
    max_batch_size: 5
    safety_factor: 0.9
  optimizer: adam
  discriminator_optimizer: adam
  learning_rate: 8.0e-5
  discriminator_lr: 3.0e-5
  weight_decay: 0.0
  beta1: 0.5
  beta2: 0.999
  lr_scheduler: reduce_on_plateau
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 5
  lr_scheduler_min_lr: 5.0e-6
  amp: true
  clip_grad_norm: 1.0
  save_every: 5
  regime_reweighting:
    enabled: true
    los_weight: 1.0
    nlos_weight: 2.25
    low_antenna_boost: 0.35
    city_type_weights:
      open_lowrise: 0.95
      mixed_midrise: 1.1
      dense_highrise: 1.35
    default_city_weight: 1.0
    min_weight: 0.5
    max_weight: 4.0

loss:
  lambda_recon: 0.0
  lambda_gan: 0.0
  mse_weight: 1.0
  l1_weight: 0.25
  adversarial_loss: bce

multiscale_path_loss:
  enabled: true
  scales: [2, 4]
  weights: [0.6, 0.4]
  min_valid_ratio: 0.5
  loss_weight: 0.2

prior_residual_path_loss:
  enabled: true
  use_formula_input_channel: true
  optimize_residual_only: true
  clamp_final_output: true
  loss_weight: 1.0
  mse_weight: 1.0
  l1_weight: 0.25

augmentation:
  enable: false
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.4

runtime:
  device: cuda
  output_dir: outputs/fiftyfirsttry51_pmnet_prior_stage1_literature
  resume_checkpoint: outputs/fiftyfirsttry51_pmnet_prior_stage1_literature_t51_stage1_w112_4gpu/reduced_try49_best_112_to_112.pt

target_columns:
  - path_loss

target_losses:
  path_loss: mse

target_metadata:
  path_loss:
    scale: 180.0
    offset: 0.0
    unit: dB
    clip_min: 0.0
    clip_max: 180.0
    predict_linear: false

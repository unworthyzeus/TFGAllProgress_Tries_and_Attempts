seed: 42

data:
  root_dir: CHANGE_ME_DATA_ROOT
  train_manifest: CHANGE_ME_TRAIN_MANIFEST
  val_manifest: CHANGE_ME_VAL_MANIFEST
  los_input_column: binary_los
  scalar_feature_columns:
    - antenna_height
    - antenna_power
    - bandwidth
  constant_scalar_features:
    frequency_ghz: 7.125
  scalar_feature_norms:
    antenna_height: 500.0
    antenna_power: 100.0
    bandwidth: 1000.0
    frequency_ghz: 10.0
  image_size: 128
  num_workers: 4

model:
  base_channels: 64
  disc_base_channels: 64
  out_channels: 4
  use_scalar_channels: true

training:
  batch_size: 4
  epochs: 40
  generator_lr: 0.0002
  discriminator_lr: 0.0002
  beta1: 0.5
  beta2: 0.999
  weight_decay: 0.0
  amp: true
  clip_grad_norm: 1.0
  save_every: 5
  subset_size: null
  save_validation_json_each_epoch: true
  run_final_test_after_training: true

loss:
  lambda_gan: 1.0
  lambda_recon: 100.0
  mse_weight: 1.0
  l1_weight: 0.2

augmentation:
  enable: true
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.4

runtime:
  device: auto
  output_dir: outputs/cgan_unet_run
  resume_checkpoint: null

postprocess:
  enable: true
  regression_median_kernel: 3
  augmented_los_median_kernel: 3
  export_augmented_los_binary: false
  augmented_los_threshold: 0.5
  enforce_binary_los_consistency: false
  binary_los_consistency_floor: 0.5

target_columns:
  - delay_spread
  - angular_spread
  - channel_power
  - augmented_los

target_losses:
  delay_spread: mse
  angular_spread: mse
  channel_power: mse
  augmented_los: mse

target_metadata:
  delay_spread:
    scale: 1000.0
    offset: 0.0
    unit: ns
    clip_min: 0.0
    clip_max: 1000.0
  angular_spread:
    scale: 180.0
    offset: 0.0
    unit: deg
    clip_min: 0.0
    clip_max: 180.0
  channel_power:
    scale: 160.0
    offset: -120.0
    unit: dB
    clip_min: -140.0
    clip_max: 60.0
  augmented_los:
    scale: 1.0
    offset: 0.0
    unit: soft_los
    clip_min: 0.0
    clip_max: 1.0

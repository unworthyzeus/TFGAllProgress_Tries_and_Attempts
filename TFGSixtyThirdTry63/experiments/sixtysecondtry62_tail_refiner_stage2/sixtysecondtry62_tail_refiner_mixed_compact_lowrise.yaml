seed: 42
data:
  format: hdf5
  hdf5_path: ../Datasets/CKM_Dataset_270326.h5
  input_column: topology_map
  input_metadata:
    scale: 255.0
    offset: 0.0
  los_input_column: los_mask
  distance_map_channel: true
  exclude_non_ground_targets: true
  non_ground_threshold: 0.0
  path_loss_formula_input:
    enabled: true
    formula: hybrid_two_ray_cost231_a2g_nlos
    regime_calibration_json: prior_calibration/regime_obstruction_train_only_from_try47.json
    prefer_threshold_city_type: true
    meters_per_pixel: 1.0
    frequency_ghz: 7.125
    receiver_height_m: 1.5
    include_confidence_channel: true
    confidence_kernel_size: 31
    cache_version: try62_prior_auto_city_v1
    cache_enabled: false
    cache_dir: prior_cache/try62_prior_auto_city_v1
    precomputed_hdf5: ''
  path_loss_obstruction_features:
    enabled: true
    precomputed_hdf5: ../TFGFiftiethTry50/precomputed/obstruction_features_u8.h5
    meters_per_pixel: 1.0
    angle_bins: 720
    include_shadow_depth: true
    include_distance_since_los_break: true
    include_max_blocker_height: true
    include_blocker_count: true
  path_loss_saturation_db: 180
  path_loss_ignore_nonfinite: true
  target_field_map: {}
  split_mode: city_holdout
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  scalar_feature_columns:
  - antenna_height_m
  hdf5_scalar_specs:
  - name: antenna_height_m
    from_dataset: uav_height
  constant_scalar_features: {}
  scalar_feature_norms:
    antenna_height_m: 120.0
  image_size: 513
  num_workers: 4
  val_num_workers: 2
  val_batch_size: 2
  persistent_workers: true
  val_persistent_workers: false
  prefetch_factor: 4
  partition_filter:
    topology_class: mixed_compact_lowrise
  topology_partitioning:
    density_q1: 0.12
    density_q2: 0.28
    height_q1: 12.0
    height_q2: 28.0
augmentation:
  enable: true
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.5
model:
  base_channels: 32
  disc_base_channels: 40
  disc_norm_type: group
  disc_input_downsample_factor: 1
  encoder_blocks:
  - 2
  - 2
  - 2
  - 2
  context_dilations:
  - 1
  - 2
  - 4
  - 8
  dropout: 0.05
  gradient_checkpointing: true
  out_channels: 1
  use_scalar_channels: true
  norm_type: group
training:
  batch_size: 2
  epochs: 180
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.0
    rewind_to_best_model: true
  selection_metrics:
    path_loss.rmse_physical: 1.0
  save_validation_json_each_epoch: true
  run_final_test_after_training: true
  optimizer: adam
  learning_rate: 8.0e-05
  weight_decay: 0.0
  beta1: 0.5
  beta2: 0.999
  lr_scheduler: reduce_on_plateau
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 5
  lr_scheduler_min_lr: 5.0e-06
  amp: true
  clip_grad_norm: 1.0
  save_every: 1
loss:
  mse_weight: 1.0
  l1_weight: 0.0
  multiscale_path_loss:
    enabled: false
    scales:
    - 2
    - 4
    weights:
    - 0.6
    - 0.4
    min_valid_ratio: 0.5
    loss_weight: 0.0
tail_refiner:
  refiner_arch: unet
  refiner_base_channels: 32
  use_gate: false
  gate_loss_weight: 0.0
  residual_weight: 1.0
  final_weight: 1.0
  stage1_config: experiments/sixtysecondtry62_partitioned_stage1/sixtysecondtry62_expert_mixed_compact_lowrise.yaml
  stage1_checkpoint: outputs/sixtysecondtry62_expert_mixed_compact_lowrise/best_model.pt
  oversample:
    enabled: false
    threshold_db: 6.0
    temperature_db: 2.5
    alpha: 1.0
    nlos_boost: 0.0
    antenna_boost: 0.0
  tail_focus:
    enabled: false
    threshold_db: 6.0
    temperature_db: 2.5
    alpha: 1.0
    nlos_boost: 0.0
    antenna_boost: 0.0
    max_weight: 1.0
  gate_target:
    threshold_db: 6.0
    temperature_db: 2.0
  high_frequency_loss:
    enabled: true
    laplacian_weight: 0.04
    gradient_weight: 0.015
  regime_reweighting:
    enabled: false
    los_weight: 1.0
    nlos_weight: 1.0
    low_antenna_boost: 0.0
    city_type_weights:
      open_lowrise: 1.0
      mixed_midrise: 1.0
      dense_highrise: 1.0
    default_city_weight: 1.0
    min_weight: 1.0
    max_weight: 1.0
runtime:
  device: cuda
  output_dir: outputs/sixtysecondtry62_tail_refiner_mixed_compact_lowrise
  resume_checkpoint: ''
target_columns:
- path_loss
target_losses:
  path_loss: mse
target_metadata:
  path_loss:
    scale: 180.0
    offset: 0.0
    unit: dB
    clip_min: 0.0
    clip_max: 180.0
    predict_linear: false

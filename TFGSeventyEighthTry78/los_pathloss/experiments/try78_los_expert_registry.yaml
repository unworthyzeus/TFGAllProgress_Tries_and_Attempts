# Try 78 — LoS path-loss expert registry
# 6 per-topology-class experts, each trained on LoS pixels only (los_region_mask_mode: los_only).
# Architecture: PMHNet (prior-residual, FiLM height conditioning), base_channels=60, hf_channels=20.
# Source architecture: TFGSeventyFourthTry74 / model_pmhhnet.py

experts:
  - id: open_sparse_lowrise_los
    topology_class: open_sparse_lowrise
    config: try78_expert_open_sparse_lowrise_los.yaml
    output_dir: outputs/try78_expert_open_sparse_lowrise_los

  - id: open_sparse_vertical_los
    topology_class: open_sparse_vertical
    config: try78_expert_open_sparse_vertical_los.yaml
    output_dir: outputs/try78_expert_open_sparse_vertical_los

  - id: mixed_compact_lowrise_los
    topology_class: mixed_compact_lowrise
    config: try78_expert_mixed_compact_lowrise_los.yaml
    output_dir: outputs/try78_expert_mixed_compact_lowrise_los

  - id: mixed_compact_midrise_los
    topology_class: mixed_compact_midrise
    config: try78_expert_mixed_compact_midrise_los.yaml
    output_dir: outputs/try78_expert_mixed_compact_midrise_los

  - id: dense_block_midrise_los
    topology_class: dense_block_midrise
    config: try78_expert_dense_block_midrise_los.yaml
    output_dir: outputs/try78_expert_dense_block_midrise_los

  - id: dense_block_highrise_los
    topology_class: dense_block_highrise
    config: try78_expert_dense_block_highrise_los.yaml
    output_dir: outputs/try78_expert_dense_block_highrise_los

topology_partitioning:
  density_q1: 0.12
  density_q2: 0.28
  height_q1: 12.0
  height_q2: 28.0

seed: 42
data:
  hdf5_path: ../../Datasets/CKM_Dataset_270326.h5
  val_ratio: 0.15
  test_ratio: 0.15
  split_seed: 42
  image_size: 513
  partition_filter:
    topology_class: dense_block_highrise
  metric: angular_spread
model:
  clamp_lo: 0.0
  clamp_hi: 90.0
  base_width: 48
  K: 5
  sigma_min: 0.5
  sigma_max: 45.0
  spike_mu_max: 5.0
  spike_sigma_min: 0.2
  spike_sigma_max: 2.5
training:
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_epochs: 1
  epochs: 120
  batch_size: 1
  grad_accum_steps: 8
  patience: 15
  num_workers: 4
runtime:
  device: cuda
  output_dir: outputs/try78_expert_dense_block_highrise_angular_spread
  resume_checkpoint: ''
